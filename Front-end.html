<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontrol Lampu ESP32</title>
    <style>
        /* Pengaturan latar belakang dan tata letak */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #e9ecef;
        }

        /* Desain kotak (card) utama */
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }

        h1 {
            margin-top: 0;
            color: #343a40;
            font-size: 24px;
        }

        /* Desain teks status */
        .status {
            font-size: 28px;
            font-weight: bold;
            margin: 30px 0;
            color: #dc3545; /* Warna merah untuk status MATI */
            transition: color 0.3s;
        }

        /* Kelas tambahan jika status berubah menjadi NYALA */
        .status.on {
            color: #28a745; /* Warna hijau untuk status NYALA */
        }

        /* Desain tombol */
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            width: 100%;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn:active {
            transform: scale(0.95); /* Efek tombol ditekan */
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Kontrol Lampu</h1>
        <div class="status" id="statusLampu">MATI</div>
        
        <button class="btn" id="tombolLampu" onclick="toggleLampu()">Nyalakan Lampu</button>
    </div>

    <script>
        // Variabel untuk menyimpan status saat ini (simulasi)
        let lampuMenyala = false;

        function toggleLampu() {
            // Membalikkan nilai status (true ke false, false ke true)
            lampuMenyala = !lampuMenyala;
            
            // Mengambil elemen HTML berdasarkan ID
            const statusElement = document.getElementById("statusLampu");
            const tombolElement = document.getElementById("tombolLampu");
            
            if (lampuMenyala) {
                // Jika nyala, ubah teks dan warna menjadi hijau
                statusElement.innerText = "NYALA";
                statusElement.classList.add("on");
                tombolElement.innerText = "Matikan Lampu";
            } else {
                // Jika mati, kembali ke kondisi awal (merah)
                statusElement.innerText = "MATI";
                statusElement.classList.remove("on");
                tombolElement.innerText = "Nyalakan Lampu";
            }
        }
    </script>

</body>
</html>
