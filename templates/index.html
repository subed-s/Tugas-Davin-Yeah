<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontrol LED ESP32</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin-top: 10vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: inline-block;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            transition: 0.3s;
        }
        .btn-on { background-color: #28a745; color: white; }
        .btn-on:hover { background-color: #218838; }
        .btn-off { background-color: #dc3545; color: white; }
        .btn-off:hover { background-color: #c82333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Kontrol LED Jarak Jauh</h2>
        <p>Klik tombol di bawah untuk menyalakan/mematikan LED di Wokwi</p>
        <button class="btn-on" onclick="sendControl('ON')">Nyalakan LED</button>
        <button class="btn-off" onclick="sendControl('OFF')">Matikan LED</button>
    </div>

    <script>
        // Fungsi untuk mengirim data ke backend Python
        function sendControl(state) {
            fetch('/api/led', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ state: state })
            })
            .then(response => response.json())
            .then(data => console.log('Berhasil:', data))
            .catch((error) => console.error('Error:', error));
        }
    </script>
</body>
</html>
